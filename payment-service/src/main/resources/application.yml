spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin@123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin@123}
    listener:
      type: direct
      direct:
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000ms
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8086

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_51ShYsBFIOgharRgILUZniUK5LMfNDjj8Bzs7pBMPYbQYYE04upl7Cj9RHYFG0BseDD72lCZuSgoDQvNF7QmvQ3uU00TPRFWTpu}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:8080/api/v1/payments/webhook/success?session_id={CHECKOUT_SESSION_ID}}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:8080/api/v1/payments/webhook/cancel?session_id={CHECKOUT_SESSION_ID}}
  currency: ${STRIPE_CURRENCY:bdt}

payment:
  expiration:
    lifetime: ${PAYMENT_EXPIRATION_LIFETIME:PT30M}
    check-delay: ${PAYMENT_EXPIRATION_CHECK_DELAY:PT60S}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
