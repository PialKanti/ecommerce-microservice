services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  db:
    container_name: ecommerce_postgres
    image: postgres:17.5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin@123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: ecommerce_redis
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rabbitmq:
    container_name: ecommerce_rabbitmq
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin@123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Tier 1: Service Registry ──────────────────────────────────────────────────

  eureka-server:
    container_name: ecommerce_eureka
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOSTNAME: eureka-server
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Tier 2: Business Microservices (parallel, after eureka is healthy) ─────────

  auth-service:
    container_name: ecommerce_auth
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://db:5432/auth_db
      DB_USERNAME: admin
      DB_PASSWORD: admin@123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SIGNING_KEY: verySecretKeyForJwtSigningExample123456789verySecretKeyForJwtSigningExample123456789
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  product-service:
    container_name: ecommerce_product
    build:
      context: .
      dockerfile: product-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      PRODUCT_DB_URL: jdbc:postgresql://db:5432/product_db
      DB_USERNAME: admin
      DB_PASSWORD: admin@123
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  inventory-service:
    container_name: ecommerce_inventory
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      INVENTORY_DB_URL: jdbc:postgresql://db:5432/inventory_db
      DB_USERNAME: admin
      DB_PASSWORD: admin@123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin@123
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  cart-service:
    container_name: ecommerce_cart
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      CART_DB_URL: jdbc:postgresql://db:5432/cart_db
      DB_USERNAME: admin
      DB_PASSWORD: admin@123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin@123
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  order-service:
    container_name: ecommerce_order
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      ORDER_DB_URL: jdbc:postgresql://db:5432/order_db
      DB_USERNAME: admin
      DB_PASSWORD: admin@123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin@123
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  payment-service:
    container_name: ecommerce_payment
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      PAYMENT_DB_URL: jdbc:postgresql://db:5432/payment_db
      DB_USERNAME: admin
      DB_PASSWORD: admin@123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin@123
      STRIPE_API_KEY: sk_test_51ShYsBFIOgharRgILUZniUK5LMfNDjj8Bzs7pBMPYbQYYE04upl7Cj9RHYFG0BseDD72lCZuSgoDQvNF7QmvQ3uU00TPRFWTpu
      STRIPE_SUCCESS_URL: "http://localhost:8080/api/v1/payments/webhook/success?session_id={CHECKOUT_SESSION_ID}"
      STRIPE_CANCEL_URL: "http://localhost:8080/api/v1/payments/webhook/cancel?session_id={CHECKOUT_SESSION_ID}"
      STRIPE_CURRENCY: bdt
      PAYMENT_EXPIRATION_LIFETIME: PT30M
      PAYMENT_EXPIRATION_CHECK_DELAY: PT60S
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Tier 3: API Gateway (after all business services are healthy) ──────────────

  api-gateway:
    container_name: ecommerce_gateway
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SIGNING_KEY: verySecretKeyForJwtSigningExample123456789verySecretKeyForJwtSigningExample123456789
    networks:
      - backend_net
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  backend_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
