spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service-public
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            - id: auth-service-user-profile
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/users/**

            - id: auth-service-admin-roles
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/admin/roles/**

            - id: auth-service-admin-permissions
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/admin/permissions/**

            - id: auth-service-admin-users
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/admin/users/**

            - id: product-service-public-products
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/products/**

            - id: product-service-public-categories
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/categories/**

            - id: product-service-admin-products
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/admin/products/**

            - id: product-service-admin-categories
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/admin/categories/**

            - id: inventory-service-public
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/inventory/**

            - id: inventory-service-admin
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/admin/inventory/**

            - id: cart-service
              uri: lb://CART-SERVICE
              predicates:
                - Path=/api/v1/cart/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

eureka:
  client:
    service-url:
      default-zone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  signing-key: ${JWT_SIGNING_KEY:verySecretKeyForJwtSigningExample123456789verySecretKeyForJwtSigningExample123456789}

management:
  endpoints:
    web:
      exposure:
        include: health,info
