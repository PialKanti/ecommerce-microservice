spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
          - id: auth-service-public
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/v1/auth/**

          - id: auth-service-admin-roles
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/v1/admin/roles/**

          - id: auth-service-admin-permissions
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/v1/admin/permissions/**

          - id: auth-service-admin-users
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/v1/admin/users/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

eureka:
  client:
    service-url:
      default-zone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  signing-key: ${JWT_SIGNING_KEY:verySecretKeyForJwtSigningExample123456789verySecretKeyForJwtSigningExample123456789}

management:
  endpoints:
    web:
      exposure:
        include: health,info
